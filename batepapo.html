<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sala de Bate-Papo</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: var(--bg-color, #f0f0f0); color: var(--text-color, #000); }
    .chat-container { width: 80%; margin: 40px auto; padding: 20px; background-color: var(--container-bg, #fff); border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
    .chat-header { background-color: #333; color: #fff; padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .chat-messages { padding: 20px; overflow-y: auto; max-height: 400px; border-bottom: 1px solid #ccc; }
    .chat-message { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #ddd; }
    #message-input { width: 75%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
    #send-button { padding: 10px 20px; border-radius: 5px; background-color: #333; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <div class="main-wrapper" style="display: flex; gap: 20px; width: 90%; margin: 20px auto;">
  <!-- Coluna Lateral -->
  <div id="user-list" style="width: 250px; background: #eee; padding: 15px; border-radius: 10px;">
    <h3>Usuários</h3>
    <div id="online-users"></div>
  </div>

  <!-- Chat Principal -->
  <div id="chat-container" class="chat-container" style="flex: 1; margin: 0;">
    <div class="chat-header">
      <h2>Sala de Bate-Papo <span id="target-user-display"></span></h2>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <input type="text" id="message-input" placeholder="Digite sua mensagem...">
    <button id="send-button">Enviar</button>
  </div>
</div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>

// Configuração e Inicialização
const firebaseConfig = {
  apiKey: "AIzaSyD0BXvoLhMipHUP_zo6lebe2O28ZCeFVS4",
  authDomain: "turmadocafezinho.firebaseapp.com",
  databaseURL: "https://turmadocafezinho-default-rtdb.firebaseio.com",
  projectId: "turmadocafezinho",
  storageBucket: "turmadocafezinho.firebasestorage.app",
  messagingSenderId: "652356392965",
  appId: "1:652356392965:web:4785b413ddc2ec6252a46c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

const chatMessages = document.getElementById('chat-messages');
const messageInput = document.getElementById('message-input');
const sendButton = document.getElementById('send-button');
const onlineUsersList = document.getElementById('online-users');
const targetUserDisplay = document.getElementById('target-user-display');

const urlParams = new URLSearchParams(window.location.search);
const username = urlParams.get('usuario') || "Anônimo";
let targetUser = null;

// Marcar usuário como online
auth.signInAnonymously().then(() => {
  const userRef = db.ref("usuarios/" + username);
  userRef.set({ status: "online", inChat: true });
  userRef.onDisconnect().remove(); // Remove da lista ao fechar o navegador
});

// Renderizar lista de usuários lateral
db.ref("usuarios").on("value", (snapshot) => {
  onlineUsersList.innerHTML = "";
  snapshot.forEach((child) => {
    const user = child.key;
    const div = document.createElement('div');
    div.style.marginBottom = "10px";
    div.innerHTML = `
      <span>${user}</span>
      <button onclick="setTarget('${user}')" style="margin-left: 5px;">Chamar</button>
    `;
    onlineUsersList.appendChild(div);
  });
});

// Função para selecionar destinatário
window.setTarget = (name) => {
  targetUser = name;
  targetUserDisplay.innerText = `(para: ${name})`;
};

// Renderizar mensagens
function renderMessage(data) {
  const msg = data.val();
  // Se for privada e não for para mim ou de mim, ignora (opcional)
  const isPrivate = msg.to && (msg.to !== username && msg.user !== username);
  if (isPrivate) return;

  const div = document.createElement('div');
  div.className = 'chat-message';
  div.innerHTML = `<b>${msg.user} ${msg.to ? '→ ' + msg.to : ''}</b>: ${msg.text}`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

db.ref("mensagens").limitToLast(50).on("child_added", renderMessage);

// Enviar mensagem
sendButton.onclick = () => {
  const text = messageInput.value.trim();
  if (text) {
    db.ref("mensagens").push({ 
      user: username, 
      to: targetUser, 
      text: text, 
      timestamp: Date.now() 
    });
    messageInput.value = '';
    targetUser = null; // Reseta após enviar
    targetUserDisplay.innerText = '';
  }
};

  </script>
</body>
</html>
