<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Firebase</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: var(--bg-color, #f0f0f0); color: var(--text-color, #000); }
    .chat-container { width: 80%; margin: 40px auto; padding: 20px; background-color: var(--container-bg, #fff); border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
    .chat-header { background-color: #333; color: #fff; padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .chat-messages { padding: 20px; overflow-y: auto; max-height: 400px; border-bottom: 1px solid #ccc; }
    .chat-message { margin-bottom: 10px; padding: 10px; border-bottom: 1px solid #ddd; }
    #message-input { width: 75%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
    #send-button { padding: 10px 20px; border-radius: 5px; background-color: #333; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

  <div id="chat-container" class="chat-container">
    <div class="chat-header">
      <h2>Sala de Bate-Papo</h2>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <input type="text" id="message-input" placeholder="Digite sua mensagem...">
    <button id="send-button">Enviar</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD0BXvoLhMipHUP_zo6lebe2O28ZCeFVS4",
      authDomain: "turmadocafezinho.firebaseapp.com",
      databaseURL: "https://turmadocafezinho-default-rtdb.firebaseio.com",
      projectId: "turmadocafezinho",
      storageBucket: "turmadocafezinho.firebasestorage.app",
      messagingSenderId: "652356392965",
      appId: "1:652356392965:web:4785b413ddc2ec6252a46c"
    };  

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const chatMessages = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');
    const sendButton = document.getElementById('send-button');

    const urlParams = new URLSearchParams(window.location.search);
    const username = urlParams.get('usuario') || "Anônimo";
    const avatarEmoji = ['😀','😎','🧠','👻','🐱'][Math.floor(Math.random() * 5)];

    function renderMessage(data) {
      const msg = data.val();
      const div = document.createElement('div');
      div.className = 'chat-message';
      div.innerHTML = `<b>${msg.emoji} ${msg.user}</b>: ${msg.text}`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    auth.signInAnonymously().then(() => {
      db.ref("mensagens").limitToLast(50).on("child_added", renderMessage);
    });

    sendButton.onclick = () => {
      const text = messageInput.value.trim();
      if (text) {
        db.ref("mensagens").push({ user: username, emoji: avatarEmoji, text: text, timestamp: Date.now() });
        messageInput.value = '';
      }
    };
  </script>
</body>
</html>
